# Cryptogen topology for the bench.local election network.
# This file defines the certificate hierarchy and node counts for five distinct
# orderer organizations and three application organizations. Its role is to
# generate MSP and TLS material; it does not itself determine whether the
# resulting network will run Raft or SmartBFT.

# Ordering organizations.
# Each orderer is placed in its own organization so that the deployment can
# model institutionally distinct ordering identities with separate MSP roots and
# per-node domains.
OrdererOrgs:
  - Name: ECI1
    Domain: eci1.bench.local
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer1        # will listen on 7050

  - Name: ECI2
    Domain: eci2.bench.local
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer2        # 8050

  - Name: OPP1
    Domain: opp1.bench.local
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer3        # 9050

  - Name: OPP2
    Domain: opp2.bench.local
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer4        # 10050

  - Name: CIV1
    Domain: civ1.bench.local
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer5        # 11050

# Application organizations.
# Each governance stakeholder receives one peer and one user identity in this
# topology, which is sufficient for the three-organization endorsement and audit
# model used by the benchmark network.
PeerOrgs:
  - Name: ECIMSP
    Domain: eci.bench.local
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1

  - Name: OppMSP
    Domain: opp.bench.local
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1

  - Name: CivilMSP
    Domain: civil.bench.local
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 1

