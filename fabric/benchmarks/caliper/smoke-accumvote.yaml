# Short Caliper smoke configuration for repeated read-only evaluation of
# the accumvote contract. The intent is to verify end-to-end connectivity
# and request flow with a harmless query before running more demanding
# workloads.
test:
  name: "accumvote-smoke"
  description: "Smoke test: Caliper -> Fabric Gateway -> accumvote.GetParams"
  workers:
    number: 1

  rounds:
    - label: getparams
      description: "Call GetParams repeatedly for a few seconds"
      txDuration: 5          # seconds
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 5 # 5 evals/sec
      workload:
        module: ./workload/smoke-getparams.js
        arguments: {}
